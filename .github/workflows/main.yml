name: ☁️ Bulk Ringtone Generator → Firebase

on:
  workflow_dispatch:
    inputs:
      auto_generate_count:
        description: "🤖 Auto-generate N ringtones (0 to disable)"
        required: true
        default: "10"

      length_seconds:
        description: "⏱️ Duration per ringtone (seconds, e.g. 5)"
        required: true
        default: "5"

      auto_process:
        description: "🎛️ Auto-process audio (trim silence + volume boost)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      volume_boost_pct:
        description: "🔊 Volume boost % (100–400)"
        required: false
        default: "200"

      silence_threshold:
        description: "🔇 Silence trim threshold (0.005–0.1)"
        required: false
        default: "0.02"

      pad_ms:
        description: "⏩ Edge padding ms (0–500)"
        required: false
        default: "100"

      target_account:
        description: "🔥 Target Firebase DB (Zedge account)"
        required: true
        default: "zedge_2"
        type: choice
        options:
          - zedge_1
          - zedge_2
          - zedge_3
          - all_three

      gemini_session:
        description: "🌐 Gemini Web Session JSON (paste storageState JSON — no API key needed!)"
        required: false
        default: ""

jobs:
  generate-ringtones:
    name: 🎵 Generate & Push Ringtones to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Install Dependencies
        run: |
          npm init -y
          npm install node-fetch@3 fluent-ffmpeg @ffmpeg-installer/ffmpeg playwright playwright-extra puppeteer-extra-plugin-stealth
          npx playwright install chromium --with-deps

      - name: 🖥️ Start Virtual Display (Xvfb)
        run: |
          sudo apt-get install -y xvfb
          Xvfb :99 -screen 0 1920x1080x24 &
          sleep 2
          echo "DISPLAY=:99" >> $GITHUB_ENV
          echo "✅ Xvfb virtual display started on :99"

      - name: 🎵 Generate Ringtones & Push to Firebase
        env:
          STABLE_AUDIO_TOKEN: ${{ secrets.STABLE_AUDIO_TOKEN }}
          GEMINI_SESSION: ${{ secrets.GEMINI_SESSION }}
          GEMINI_SESSION_INPUT: ${{ github.event.inputs.gemini_session }}
          AUTO_GENERATE_COUNT: ${{ github.event.inputs.auto_generate_count }}
          TARGET_ACCOUNT: ${{ github.event.inputs.target_account }}
          LENGTH_SECONDS: ${{ github.event.inputs.length_seconds }}
          AUTO_PROCESS: ${{ github.event.inputs.auto_process }}
          VOLUME_BOOST_PCT: ${{ github.event.inputs.volume_boost_pct }}
          SILENCE_THRESHOLD: ${{ github.event.inputs.silence_threshold }}
          PAD_MS: ${{ github.event.inputs.pad_ms }}
        run: |
          cat > generator.mjs << 'SCRIPT_EOF'
          import fetch from 'node-fetch';
          import fs from 'fs';
          import path from 'path';
          import { execSync } from 'child_process';
          import { createRequire } from 'module';

          // ─── CONFIG ────────────────────────────────────────────────────────────────
          const STABLE_AUDIO_TOKEN   = process.env.STABLE_AUDIO_TOKEN?.trim();
          const GEMINI_SESSION_RAW   = (process.env.GEMINI_SESSION_INPUT?.trim() || process.env.GEMINI_SESSION || '').trim();
          const TARGET_ACCOUNT       = (process.env.TARGET_ACCOUNT || 'zedge_2').trim().toLowerCase();
          const QUEUE_PATH           = 'wallpaperQueue';
          const AUTO_GENERATE_COUNT  = parseInt(process.env.AUTO_GENERATE_COUNT || '10', 10);
          const LENGTH_SECONDS       = parseInt(process.env.LENGTH_SECONDS || '30', 10);
          const AUTO_PROCESS         = process.env.AUTO_PROCESS !== 'false';
          const VOLUME_BOOST         = (parseInt(process.env.VOLUME_BOOST_PCT || '200', 10)) / 100;
          const SILENCE_THRESHOLD    = parseFloat(process.env.SILENCE_THRESHOLD || '0.02');
          const PAD_SEC              = (parseInt(process.env.PAD_MS || '100', 10)) / 1000;

          // Parse Gemini session
          if (!GEMINI_SESSION_RAW) {
            console.error('❌ Error: GEMINI_SESSION secret or input is missing. Direct Gemini Web Session is required.');
            process.exit(1);
          }
          let GEMINI_STORAGE_STATE = null;
          try {
            GEMINI_STORAGE_STATE = JSON.parse(GEMINI_SESSION_RAW);
            console.log('🌐 Gemini Web Session loaded successfully (no API key needed!)');
          } catch (e) {
            console.error('❌ Error: GEMINI_SESSION is not valid JSON. Please check your storageState JSON export.');
            process.exit(1);
          }

          let geminiBrowser = null;
          let geminiPage = null;

          async function initGemini() {
            console.log('🌐 Starting Gemini Shared Browser...');
            const { chromium } = await import('playwright-extra');
            const { default: StealthPlugin } = await import('puppeteer-extra-plugin-stealth');
            chromium.use(StealthPlugin());

            geminiBrowser = await chromium.launch({
              headless: false,  // Xvfb display
              args: ['--no-sandbox', '--disable-setuid-sandbox', '--disable-dev-shm-usage',
                     '--disable-blink-features=AutomationControlled']
            });

            const context = await geminiBrowser.newContext({
              storageState: GEMINI_STORAGE_STATE,
              userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
              viewport: { width: 1280, height: 800 }
            });

            geminiPage = await context.newPage();
            console.log('🌐 Loading gemini.google.com/app/new ...');
            await geminiPage.goto('https://gemini.google.com/app/new', { waitUntil: 'domcontentloaded', timeout: 30000 });
            await sleep(3000);

            // Dismiss any potential introductory overlays / cookie banners
            const dismissSels = [
              'button:has-text("I agree")',
              'button:has-text("Agree")',
              'button:has-text("Got it")',
              'button:has-text("Dismiss")',
              'button:has-text("Close")',
              'button:has-text("OK")'
            ];
            for (const sel of dismissSels) {
              try {
                if (await geminiPage.isVisible(sel)) {
                  await geminiPage.click(sel);
                  console.log(`  🧹 Dismissed overlay: ${sel}`);
                  await sleep(1000);
                }
              } catch (e) {}
            }

            // Verify logged in
            const inputVisible = await geminiPage.isVisible('div.ql-editor[contenteditable="true"]').catch(() => false);
            if (!inputVisible) {
              console.warn('  ⚠️ Gemini session may be expired — input not found. Check GEMINI_SESSION secret.');
              throw new Error('Gemini web: input not found — session likely expired');
            }
            console.log('  ✅ Gemini web session active and initialized!');
          }

          // ─── FIREBASE DB ROUTING ──────────────────────────────────────────────────
          const FIREBASE_DB_MAP = {
            zedge_1: 'https://zedgeautomation-default-rtdb.firebaseio.com',
            zedge_2: 'https://zedge-automation-2-default-rtdb.asia-southeast1.firebasedatabase.app',
            zedge_3: 'https://zedge-automation-3-default-rtdb.asia-southeast1.firebasedatabase.app'
          };

          // Resolve which DB URLs to target
          let TARGET_DB_URLS;
          if (TARGET_ACCOUNT === 'all_three') {
            TARGET_DB_URLS = Object.entries(FIREBASE_DB_MAP).map(([name, url]) => ({ name, url }));
          } else if (FIREBASE_DB_MAP[TARGET_ACCOUNT]) {
            TARGET_DB_URLS = [{ name: TARGET_ACCOUNT, url: FIREBASE_DB_MAP[TARGET_ACCOUNT] }];
          } else {
            console.error(`❌ Unknown target_account: "${TARGET_ACCOUNT}". Use: zedge_1, zedge_2, zedge_3, all_three`);
            process.exit(1);
          }

          // ─── VALIDATION ────────────────────────────────────────────────────────────
          // Note: STABLE_AUDIO_TOKEN is OPTIONAL — if empty, account is auto-created at startup



          let PROMPTS = [];

          console.log('============================================================');
          console.log('  ☁️  BULK RINGTONE GENERATOR → FIREBASE');
          console.log('============================================================');
          console.log(`📋 Auto-Generating: ${AUTO_GENERATE_COUNT} unique ringtones`);
          console.log(`⏱️  Duration: ${LENGTH_SECONDS}s per ringtone`);
          console.log(`🎛️  Auto-process: ${AUTO_PROCESS ? 'Yes' : 'No'}`);
          if (AUTO_PROCESS) {
            console.log(`🔊 Volume Boost: ${Math.round(VOLUME_BOOST * 100)}%`);
            console.log(`🔇 Silence Threshold: ${SILENCE_THRESHOLD}`);
            console.log(`⏩ Pad: ${Math.round(PAD_SEC * 1000)}ms`);
          }
          console.log(`🎯 Target: ${TARGET_ACCOUNT} → ${TARGET_DB_URLS.map(d => d.name).join(' + ')}`);
          TARGET_DB_URLS.forEach(d => console.log(`   🔥 ${d.name}: ${d.url}`));
          console.log(`📂 Queue Path: ${QUEUE_PATH}`);
          console.log(`🌐 Gemini Mode : Web scraping (gemini.google.com) — direct session!`);
          console.log('============================================================\n');

          // ─── GEMINI VIA WEB SCRAPING (uses saved Google session) ───────────────────
          // Uses confirmed DOM selectors from live gemini.google.com HTML:
          //   Input  : div.ql-editor[contenteditable="true"]  (QuillJS editor)
          //   Send   : button[aria-label="Send message"]
          //   Done   : div.response-footer.complete  ← CSS class added when streaming ends
          //   Text   : div[id^="model-response-message-content"]
          async function callGeminiWeb(promptTexts, geminiPage) {
            // promptTexts is an array — we send them all in sequence in one chat session
            // Returns array of response strings, one per prompt
            const responses = [];

            for (let i = 0; i < promptTexts.length; i++) {
              const prompt = promptTexts[i];
              console.log(`    🌐 [Web ${i+1}/${promptTexts.length}] Sending prompt (${prompt.length} chars)...`);

              // Count existing response-footer.complete divs before sending
              const prevDoneCount = await geminiPage.evaluate(() =>
                document.querySelectorAll('div.response-footer.complete').length
              );

              // Click input and enter prompt
              const inputSel = 'div.ql-editor[contenteditable="true"]';
              await geminiPage.waitForSelector(inputSel, { timeout: 15000 });
              await geminiPage.click(inputSel);

              // Select all and delete (clear any legacy text)
              await geminiPage.keyboard.press('Control+a');
              await geminiPage.keyboard.press('Delete');
              await sleep(150);

              // Instantly paste text via Playwright's insertText - ultra-fast and reliable!
              await geminiPage.keyboard.insertText(prompt);
              await sleep(300);

              // Select send button
              const sendSel = 'button[aria-label="Send message"]';
              await geminiPage.waitForSelector(sendSel, { timeout: 10000 });

              // If send button is disabled, try to type a space to trigger change handlers
              const isDisabled = await geminiPage.getAttribute(sendSel, 'disabled').catch(() => null);
              if (isDisabled !== null) {
                await geminiPage.keyboard.type(' ');
                await sleep(200);
              }

              // Click send
              await geminiPage.click(sendSel);

              // Wait for completion (either more complete footers or Send button enabled again)
              const deadline = Date.now() + 90000;
              let responseText = '';
              while (Date.now() < deadline) {
                await sleep(1500);

                const doneCount = await geminiPage.evaluate(() =>
                  document.querySelectorAll('div.response-footer.complete').length
                );

                const sendBtnEnabled = await geminiPage.evaluate(() => {
                  const btn = document.querySelector('button[aria-label="Send message"]');
                  return btn && !btn.hasAttribute('disabled') && window.getComputedStyle(btn).display !== 'none';
                }).catch(() => false);

                if (doneCount > prevDoneCount || sendBtnEnabled) {
                  // Wait a brief moment to let last rendering finish
                  await sleep(1000);
                  // Extract the LAST response text
                  responseText = await geminiPage.evaluate(() => {
                    const allDivs = document.querySelectorAll('div[id^="model-response-message-content"]');
                    const last = allDivs[allDivs.length - 1];
                    return last ? last.innerText.trim() : '';
                  });
                  break;
                }
              }

              if (!responseText) {
                throw new Error(`Gemini web timeout: no response for prompt ${i+1} within 90s`);
              }
              console.log(`    ✅ [Web ${i+1}] Got response (${responseText.length} chars)`);
              responses.push(responseText);
              await sleep(1000); // Brief pause between sequential prompts
            }
            return responses;
          }

          // ─── VALID RINGTONE CATEGORIES ─────────────────────────────────────────────
          const VALID_RT_CATS = [
            'LATIN', 'MESSAGE_TONES', 'OTHER', 'POP', 'RNB_SOUL', 'REGGAE', 'RELIGIOUS', 'ROCK',
            'SAYINGS', 'ALTERNATIVE', 'ANIMALS', 'BLUES', 'BOLLYWOOD', 'CHILDREN', 'CLASSICAL',
            'SOUND_EFFECTS', 'WORLD', 'COMEDY', 'CONTACT_RINGTONES', 'COUNTRY', 'DANCE',
            'ELECTRONICA', 'GAMES', 'HIP_HOP', 'HOLIDAYS', 'JAZZ'
          ];

          // ─── GEMINI RESPONSE CLEANERS ──────────────────────────────────────────────
          function cleanTitle(raw) {
            if (!raw) return '';
            // Look for quoted text
            const quoteMatch = raw.match(/"([^"\r\n]{3,60})"/);
            if (quoteMatch) return quoteMatch[1].trim();

            // Look for bold text
            const boldMatch = raw.match(/\*\*([^\*\r\n]{3,60})\*\*/);
            if (boldMatch) return boldMatch[1].trim();

            // Split by lines and filter out conversational fillers
            const lines = raw.split('\n')
              .map(l => l.trim())
              .filter(l => {
                const lower = l.toLowerCase();
                return l.length > 0 &&
                       !lower.startsWith('here') &&
                       !lower.startsWith('sure') &&
                       !lower.startsWith('based') &&
                       !lower.startsWith('suggest') &&
                       !lower.startsWith('this');
              });

            if (lines.length > 0) {
              return lines[0].replace(/^["'*\s]+|["'*\s]+$/g, '').trim().slice(0, 30);
            }
            return raw.replace(/^["'*\s]+|["'*\s]+$/g, '').slice(0, 30).trim();
          }

          function cleanKeywords(raw) {
            if (!raw) return '';
            const words = raw.match(/[a-zA-Z0-9]{2,20}/g) || [];
            const stopWords = new Set(['here', 'are', 'the', 'keywords', 'based', 'on', 'this', 'prompt', 'and', 'for', 'with', 'your', 'ringtone', 'title', 'tags', 'single', 'word']);
            const uniqueWords = [...new Set(
              words
                .map(w => w.trim())
                .filter(w => {
                  const lower = w.toLowerCase();
                  return w.length > 1 && !stopWords.has(lower);
                })
            )];
            return uniqueWords.slice(0, 10).join(', ');
          }

          function cleanCategory(raw) {
            if (!raw) return 'OTHER';
            const upper = raw.toUpperCase();
            for (const cat of VALID_RT_CATS) {
              if (upper.includes(cat)) {
                return cat;
              }
            }
            return 'OTHER';
          }

          // Write a SHORT description of this ringtone in MAXIMUM 5 WORDS.
          function cleanDescription(raw) {
            if (!raw) return '';
            const quoteMatch = raw.match(/"([^"\r\n]{3,100})"/);
            let text = quoteMatch ? quoteMatch[1] : raw;
            text = text.replace(/^(here is a short description:|description:)/i, '').trim();
            const words = text.split(/\s+/).filter(Boolean);
            return words.slice(0, 5).join(' ');
          }

          // ─── METADATA GENERATION ───────────────────────────────────────────────────
          async function generateMetadataFromPrompt(prompt) {
            console.log(`  🤖 Generating enhanced metadata...`);

            const seedList = [
              'acoustic guitar', 'heavy synth', 'cinematic orchestra', '8-bit chiptune', 'smooth jazz', 'hard rock', 'soft ambient', 'tribal drums', 'experimental noise', 'vocal choir', 'lofi beats', 'funk bass',
              'synthwave', 'cyberpunk', 'trap beat', 'drill', 'classical piano', 'orchestral brass', 'celtic harp', 'reggae dub', 'salsa', 'bossa nova', 'flamenco', 'bluegrass', 'country twang',
              'edm drop', 'dubstep wobble', 'house groove', 'techno pulse', 'trance pad', 'ambient drone', 'meditation bowl', 'nature sounds', 'industrial crunch', 'glitch hop', 'synthpop',
              'rnb slow jam', 'neo soul', 'gospel organ', 'punk rock', 'metal breakdown', 'djent', 'math rock', 'shoegaze', 'dream pop', 'indie folk', 'synth brass', 'marching band', 'ragtime piano',
              'saxophone solo', 'muted trumpet', 'electric violin', 'cello suite', 'slap bass', 'fretless bass', 'moog synthesizer', 'mellotron', 'hammond organ', 'wurlitzer', 'rhodes piano',
              'kalimba', 'marimba', 'steel pan', 'vibraphone', 'xylophone', 'glockenspiel', 'music box', 'theremin', 'didgeridoo', 'sitar', 'tabla', 'taiko drums', 'djembe', 'bongos', 'congas',
              'beatbox', 'acapella', 'kazoo', 'harmonica', 'accordion', 'banjo', 'mandolin', 'ukulele', 'koto', 'shamisen', 'guzheng', 'erhu', 'bagpipes', 'hurdy-gurdy', 'ocarina', 'pan flute',
              'dark and ominous', 'bright and cheerful', 'melancholic', 'nostalgic', 'energetic', 'calm and relaxing', 'spooky', 'ethereal', 'majestic', 'epic', 'whimsical', 'quirky', 'mysterious',
              'distorted', 'clean and crisp', 'lo-fi vinyl', 'tape saturation', 'reverb drenched', 'dry and punchy', 'fast and frantic', 'slow and dragging', 'syncopated', 'polyrhythmic'
            ];
            const randomInspirations = seedList.sort(() => 0.5 - Math.random()).slice(0, 6).join(', ');

            const ENHANCE_PROMPT = prompt 
              ? `I want to generate an AI audio track based on this simple idea: "${prompt}".\n` +
                `Please rewrite this into a highly detailed, extremely creative, and completely unique text-to-music prompt (max 30 words). ` +
                `Focus on specific instruments, mood, tempo, and texture to ensure the audio generator produces something entirely unique. ` +
                `IMPORTANT: Avoid repetitive structures or cliches. Make it as distinct as possible. ` +
                `Return ONLY the enhanced prompt, nothing else.`
              : `You are an expert audio designer. Generate a completely random, highly creative, and entirely unique text-to-music prompt (max 30 words) for a ringtone. ` +
                `To ensure extreme variety, use these as loose inspiration: ${randomInspirations}. ` +
                `CRITICAL: Every prompt must sound drastically different from typical ringtones. Avoid repetitive words. Focus on specific unusual instruments, distinct moods, unexpected tempos, and unique textures. ` +
                `Return ONLY the generated prompt, nothing else.`;

            const TITLE_PROMPT = `Based on the audio you just described, ` +
              `generate a creative, catchy, and UNIQUE title that is naturally around 20 characters long. ` +
              `IMPORTANT: DO NOT include BPM, tempo numbers, or generic words like "Ringtone", "Beat", "Sound", or "Vibe". Focus on the specific mood, style, and unique character of the sound. ` +
              `Ensure the title is highly distinctive and not similar to other generic titles. ` +
              `Only provide the title itself, no quotes, no extra text or instructions.`;

            const KEYWORDS_PROMPT = `Based on the audio you just described, ` +
              `extract 15 relevant, descriptive SINGLE-WORD keywords. IMPORTANT: Each keyword MUST be a single word only - ` +
              `NO spaces, NO hyphens, NO multi-word phrases. Focus on: audio style, genre, mood, instruments, emotions, characteristics. ` +
              `Present keywords in a single comma-separated line without punctuation or full stops.`;

            const validCategories = VALID_RT_CATS.filter(c => c !== 'OTHER').join(', ');
            const CATEGORY_PROMPT = `Based on the audio you just described, ` +
              `analyze and select the most appropriate category from this exact list. ` +
              `Return only the category name exactly as shown, nothing else: ${validCategories}`;

            const DESC_PROMPT = `Based on the audio you just described, ` +
              `write a SHORT description of this ringtone in MAXIMUM 5 WORDS. ` +
              `No punctuation, no sentences, just 5 words or fewer that capture the mood/style. ` +
              `Example outputs: "calm piano lofi beats" or "energetic hip hop groove". ` +
              `Return ONLY the short description, nothing else.`;

            if (!geminiPage) {
              throw new Error('Gemini page is not initialized!');
            }

            // Reset to a fresh chat for every new metadata prompt sequence
            console.log('  🌐 Resetting to a fresh Gemini chat...');
            await geminiPage.goto('https://gemini.google.com/app/new', { waitUntil: 'domcontentloaded', timeout: 30000 });
            await sleep(2000);

            // Send all 5 prompts sequentially in ONE chat session
            const [r0, r1, r2, r3, r4] = await callGeminiWeb(
              [ENHANCE_PROMPT, TITLE_PROMPT, KEYWORDS_PROMPT, CATEGORY_PROMPT, DESC_PROMPT],
              geminiPage
            );

            const enhancedPrompt = r0.replace(/^["']|["']$/g, '').trim() || prompt;
            const finalTitle = cleanTitle(r1);
            const finalTags = cleanKeywords(r2);
            const finalCategory = cleanCategory(r3);
            const finalDesc = cleanDescription(r4);

            console.log(`  ✨ Enhanced Prompt: "${enhancedPrompt}"`);

            return {
              enhancedPrompt: enhancedPrompt,
              title: finalTitle,
              tags: finalTags,
              category: finalCategory,
              description: finalDesc
            };
          }

          // ─── CREDENTIAL HELPERS ────────────────────────────────────────────────────
          function generateRandomEmail() {
            const ts  = Date.now();
            const rnd = Math.random().toString(36).substring(2, 10);
            const domains = ['gmail.com', 'yahoo.com', 'outlook.com', 'hotmail.com'];
            const domain  = domains[Math.floor(Math.random() * domains.length)];
            return `stableaudio_${rnd}_${ts}@${domain}`;
          }

          function generateStrongPassword() {
            const lc  = 'abcdefghijklmnopqrstuvwxyz';
            const uc  = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const num = '0123456789';
            const sp  = '!@#$%^&*';
            let pw = '';
            pw += lc[Math.floor(Math.random() * lc.length)];
            pw += lc[Math.floor(Math.random() * lc.length)];
            pw += uc[Math.floor(Math.random() * uc.length)];
            pw += uc[Math.floor(Math.random() * uc.length)];
            pw += num[Math.floor(Math.random() * num.length)];
            pw += num[Math.floor(Math.random() * num.length)];
            pw += sp[Math.floor(Math.random() * sp.length)];
            pw += sp[Math.floor(Math.random() * sp.length)];
            const all = lc + uc + num + sp;
            for (let i = 0; i < 4; i++) pw += all[Math.floor(Math.random() * all.length)];
            return pw.split('').sort(() => Math.random() - 0.5).join('');
          }

          // ─── AUTO ACCOUNT CREATION (Playwright — mirrors background.js) ───────────
          // Called automatically when Stable Audio API returns a rate-limit error.
          // Returns the new Bearer token string, or throws on failure.
          async function createStableAudioAccount() {
            const email    = generateRandomEmail();
            const password = generateStrongPassword();

            console.log('\n  🤖 AUTO ACCOUNT CREATION STARTED');
            console.log(`  📧 Email   : ${email}`);
            console.log(`  🔑 Password: ${password}`);

            // Use playwright-extra + stealth plugin → bypasses Auth0 bot detection
            // Xvfb virtual display is already running (started by the workflow step above)
            const { chromium } = await import('playwright-extra');
            const { default: StealthPlugin } = await import('puppeteer-extra-plugin-stealth');
            chromium.use(StealthPlugin());

            const browser = await chromium.launch({
              headless: false,  // Real browser on Xvfb — undetectable by Auth0
              args: [
                '--no-sandbox',
                '--disable-setuid-sandbox',
                '--disable-dev-shm-usage',
                '--disable-blink-features=AutomationControlled'
              ]
            });

            let capturedToken = null;

            try {
              const context = await browser.newContext({
                userAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36'
              });
              const page = await context.newPage();

              // ── Intercept network to capture Bearer token ──────────────────────────
              // Stable Audio's SPA sends the access token in Authorization headers.
              // We sniff it from outgoing requests to their API.
              page.on('request', req => {
                const auth = req.headers()['authorization'];
                if (auth && auth.startsWith('Bearer ') && req.url().includes('stableaudio.com')) {
                  const tok = auth.replace('Bearer ', '').trim();
                  if (tok.length > 50) {
                    capturedToken = tok;
                    console.log('  🔑 Token captured from network request!');
                  }
                }
              });
              // Also sniff /oauth/token response (PKCE code exchange) — this is the key one!
              page.on('response', async resp => {
                try {
                  const url = resp.url();
                  const isTokenEndpoint = url.includes('/oauth/token') || url.includes('/token') || url.includes('auth0') || url.includes('login.stableaudio');
                  if (isTokenEndpoint && resp.status() === 200) {
                    const json = await resp.json().catch(() => null);
                    if (json && (json.access_token || json.id_token)) {
                      capturedToken = json.access_token || json.id_token;
                      console.log(`  🔑 Token captured from /oauth/token response!`);
                    }
                  }
                } catch {}
              });

              // ── Step 1: Hit Auth0 logout to destroy SSO session server-side ──────
              console.log('  🔓 Step 1: Destroying existing Auth0 SSO session...');
              await page.goto('https://login.stableaudio.com/v2/logout', { waitUntil: 'domcontentloaded', timeout: 15000 }).catch(() => {});
              await sleep(2000);

              // ── Step 2: Clear all cookies + localStorage ──────────────────────────
              console.log('  🧹 Step 2: Wiping all cookies and storage...');
              await context.clearCookies();
              await page.evaluate(() => { try { localStorage.clear(); sessionStorage.clear(); } catch {} }).catch(() => {});

              // ── Step 3: Load Stable Audio fresh ───────────────────────────────────
              console.log('  🌐 Step 3: Loading fresh Stable Audio page...');
              await page.goto('https://stableaudio.com', { waitUntil: 'networkidle', timeout: 30000 });
              await sleep(2000);

              // ── Step 4: Click Sign Up button ─────────────────────────────────────
              console.log('  🖱️  Step 4: Looking for Sign Up button...');
              const signupSelectors = [
                'button:has-text("Sign up")',
                'button:has-text("Sign Up")',
                'a:has-text("Sign up")',
                '[data-testid="signup"]'
              ];
              let clicked = false;
              for (const sel of signupSelectors) {
                try {
                  await page.waitForSelector(sel, { timeout: 5000 });
                  await page.click(sel);
                  clicked = true;
                  console.log(`  ✅ Sign Up clicked (${sel})`);
                  break;
                } catch {}
              }
              if (!clicked) {
                // Try evaluating in-page
                clicked = await page.evaluate(() => {
                  const btn = Array.from(document.querySelectorAll('button')).find(b =>
                    ['sign up', 'sign-up'].includes(b.textContent.trim().toLowerCase())
                  );
                  if (btn) { btn.click(); return true; }
                  return false;
                });
                if (!clicked) throw new Error('Could not find Sign Up button on Stable Audio page.');
              }
              await sleep(3000);

              // ── Step 5: Wait for Auth0 email input ───────────────────────────────
              console.log('  📝 Step 5: Waiting for Auth0 registration form...');
              await page.waitForSelector('input[name="email"]', { timeout: 20000 });

              // ── Step 6: Fill email + password using React-compatible dispatch ────
              console.log('  ✍️  Step 6: Filling credentials...');
              await page.evaluate(({ em, pw }) => {
                const setter = Object.getOwnPropertyDescriptor(window.HTMLInputElement.prototype, 'value').set;
                const emailEl = document.querySelector('input[name="email"]');
                const passEl  = document.querySelector('input[name="password"]');
                if (emailEl) {
                  setter.call(emailEl, em);
                  emailEl.dispatchEvent(new Event('input',  { bubbles: true }));
                  emailEl.dispatchEvent(new Event('change', { bubbles: true }));
                }
                if (passEl) {
                  setter.call(passEl, pw);
                  passEl.dispatchEvent(new Event('input',  { bubbles: true }));
                  passEl.dispatchEvent(new Event('change', { bubbles: true }));
                }
              }, { em: email, pw: password });
              await sleep(800);

              // ── Step 7: Submit the form ───────────────────────────────────────────
              console.log('  🚀 Step 7: Submitting registration form...');
              await page.waitForSelector('button[type="submit"]', { timeout: 10000 });
              await page.click('button[type="submit"]');

              // ── Step 8: Wait for OAuth code exchange + extract token ──────────────
              // Auth0 redirects back to stableaudio.com/generate?code=...&state=...
              // The SPA POSTs to /oauth/token to exchange the code for a Bearer token.
              // We MUST NOT navigate away during this exchange — stay on callback URL!
              console.log('  ⏳ Step 8: Waiting for OAuth code exchange + token...');

              // 8a: Wait until we land on stableaudio.com
              if (!page.url().includes('stableaudio.com')) {
                try {
                  await page.waitForURL(url => url.includes('stableaudio.com'), { timeout: 60000 });
                  console.log(`  ✅ OAuth callback arrived: ${page.url()}`);
                } catch {
                  console.warn(`  ⚠️ Timeout waiting for redirect — on: ${page.url()}`);
                }
              } else {
                console.log(`  ✅ Already on stableaudio.com: ${page.url()}`);
              }

              // 8b: If URL has ?code= the SPA is exchanging it — wait for clean URL
              if (page.url().includes('code=')) {
                console.log('  🔄 OAuth code exchange in progress — waiting (do NOT navigate)...');
                try {
                  await page.waitForURL(
                    url => url.includes('stableaudio.com') && !url.includes('code='),
                    { timeout: 30000 }
                  );
                  console.log(`  ✅ Code exchanged! URL: ${page.url()}`);
                } catch {
                  console.warn('  ⚠️ Code cleanup timeout — token may already be in localStorage');
                }
              }
              await sleep(3000);

              // 8c: Poll for token (90s window, 3 strategies)
              console.log('  🔍 Step 8c: Polling for token...');
              const tokenDeadline = Date.now() + 90000;
              while (!capturedToken && Date.now() < tokenDeadline) {
                // Strategy 1: Deep localStorage scan
                const lsToken = await page.evaluate(() => {
                  for (let i = 0; i < localStorage.length; i++) {
                    const key = localStorage.key(i);
                    if (!key) continue;
                    try {
                      const parsed = JSON.parse(localStorage.getItem(key));
                      if (parsed?.body?.access_token) return parsed.body.access_token;
                      if (parsed?.access_token)       return parsed.access_token;
                      if (parsed?.idToken)             return parsed.idToken;
                    } catch {}
                  }
                  return null;
                }).catch(() => null);
                if (lsToken) { capturedToken = lsToken; break; }

                // Strategy 2: Fetch interceptor (sniff outgoing Authorization headers)
                const intercepted = await page.evaluate(() => {
                  if (window.__sniffedToken) return window.__sniffedToken;
                  if (!window.__fetchPatched) {
                    window.__fetchPatched = true;
                    const origFetch = window.fetch;
                    window.fetch = function(...args) {
                      const [, opts] = args;
                      const auth = opts?.headers?.Authorization || opts?.headers?.authorization || '';
                      if (auth.startsWith('Bearer ') && auth.length > 60)
                        window.__sniffedToken = auth.replace('Bearer ', '');
                      return origFetch.apply(this, args);
                    };
                  }
                  return null;
                }).catch(() => null);
                if (intercepted) { capturedToken = intercepted; break; }

                await sleep(1500);
              }

              if (!capturedToken) throw new Error('Token not captured within 90s after OAuth code exchange.');

              console.log('  ✅ NEW ACCOUNT CREATED SUCCESSFULLY');
              console.log(`  📧 ${email}`);
              console.log(`  🔑 Token: ${capturedToken.slice(0, 30)}...`);
              return capturedToken;

            } finally {
              await browser.close().catch(() => {});
            }
          }

          // ─── STABLE AUDIO API ──────────────────────────────────────────────────────
          // Live token — starts empty, set by auto-account-creation or from secret
          let currentToken = STABLE_AUDIO_TOKEN || null;

          async function generateStableAudio(prompt, lengthSeconds, isRetry = false) {
            const seed = Math.floor(Math.random() * 65536) - 32768;
            console.log(`  🎵 Calling Stable Audio API... (seed: ${seed})`);

            const res = await fetch(
              'https://api.stableaudio.com/v1alpha/generations/stable-audio-v2-5/text-to-music',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${currentToken}`
                },
                body: JSON.stringify({
                  data: {
                    type: 'generations',
                    attributes: {
                      prompts: [{ text: prompt, weight: 1 }],
                      length_seconds: lengthSeconds,
                      seed
                    }
                  }
                })
              }
            );

            if (!res.ok) {
              const errText = await res.text();
              const errLower = errText.toLowerCase();
              const isLimitError = (
                res.status === 429 ||
                (res.status === 400 && (
                  errLower.includes('limit') || errLower.includes('quota') ||
                  errLower.includes('credit') || errLower.includes('rate') ||
                  errLower.includes('exceeded') || errLower.includes('insufficient')
                ))
              );

              if (isLimitError && !isRetry) {
                console.warn('\n  ⚠️ API limit hit! Auto-creating new Stable Audio account...');
                currentToken = await createStableAudioAccount();
                console.log('  🔄 Retrying prompt with new token...');
                return generateStableAudio(prompt, lengthSeconds, true); // retry once
              }
              if (isLimitError) throw new Error(`API_LIMIT_REACHED (auto-recovery also failed): ${errText.slice(0, 200)}`);
              throw new Error(`Stable Audio API error (${res.status}): ${errText.slice(0, 300)}`);
            }

            const data = await res.json();
            return { resultUrl: data.data[0].links.result, seed };
          }

          async function pollStableAudioResult(resultUrl) {
            const maxRetries = 60;
            for (let i = 0; i < maxRetries; i++) {
              process.stdout.write(`  ⏳ Polling result... attempt ${i + 1}/${maxRetries}\r`);
              const res = await fetch(resultUrl, {
                headers: { 'Authorization': `Bearer ${currentToken}`, 'Accept': '*/*' }
              });
              if (res.status === 200) {
                process.stdout.write('\n');
                console.log(`  ✅ Audio generation complete!`);
                return Buffer.from(await res.arrayBuffer());
              }
              if (res.status === 202) {
                await sleep(3000);
              } else {
                throw new Error(`Poll failed: HTTP ${res.status}`);
              }
            }
            throw new Error('Timed out waiting for audio generation (3 minutes).');
          }

          // ─── AUDIO AUTO-PROCESSING (via ffmpeg) ────────────────────────────────────
          // Trim silence + apply volume boost using ffmpeg (server-side equivalent of browser AudioContext)
          async function autoProcessAudio(inputBuffer, gainFactor, silenceThreshold, padSec) {
            const tmpDir    = '/tmp/ringtone_proc';
            fs.mkdirSync(tmpDir, { recursive: true });
            const tmpIn     = path.join(tmpDir, `in_${Date.now()}.mp3`);
            const tmpOut    = path.join(tmpDir, `out_${Date.now()}.mp3`);

            fs.writeFileSync(tmpIn, inputBuffer);

            // ffmpeg command:
            //   silenceremove: trim leading/trailing silence
            //   volume: amplify by gainFactor
            const dbThreshold = 20 * Math.log10(silenceThreshold); // convert linear to dB
            const dbStr = `${dbThreshold.toFixed(1)}dB`;
            const padMs = Math.round(padSec * 1000);

            try {
              // Step 1: Detect silence boundaries and trim
              const ffmpegPath = process.env.FFMPEG_PATH || 'ffmpeg';
              const filterComplex = [
                // Trim silence from start (stop_periods=0 means only trim start)
                `silenceremove=start_periods=1:start_threshold=${dbStr}:start_duration=${padSec}`,
                // Trim silence from end (by reversing, trimming, reversing back)
                `areverse`,
                `silenceremove=start_periods=1:start_threshold=${dbStr}:start_duration=${padSec}`,
                `areverse`,
                // Apply volume boost
                `volume=${gainFactor}`
              ].join(',');

              execSync(
                `${ffmpegPath} -i "${tmpIn}" -af "${filterComplex}" -ar 44100 -ab 192k -y "${tmpOut}" 2>/dev/null`,
                { timeout: 60000 }
              );

              if (!fs.existsSync(tmpOut) || fs.statSync(tmpOut).size < 1000) {
                throw new Error('ffmpeg output empty or too small');
              }

              const outBuf = fs.readFileSync(tmpOut);
              console.log(`  🎛️  Processed: ${(inputBuffer.length / 1024).toFixed(0)}KB → ${(outBuf.length / 1024).toFixed(0)}KB`);
              return outBuf;
            } finally {
              try { fs.unlinkSync(tmpIn); } catch {}
              try { fs.unlinkSync(tmpOut); } catch {}
            }
          }

          // ─── FIREBASE HELPERS ──────────────────────────────────────────────────────
          // Push to a single DB URL, returns the new Firebase key
          async function firebasePushToUrl(dbUrl, queuePath, data) {
            const res = await fetch(`${dbUrl}/${queuePath}.json`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
            });
            if (!res.ok) {
              const err = await res.text();
              throw new Error(`Firebase push failed (${res.status}): ${err.slice(0, 200)}`);
            }
            const result = await res.json();
            return result.name;
          }

          // Push to ALL target DBs in parallel, returns array of { name, key }
          async function firebasePushAll(queuePath, data) {
            const results = await Promise.allSettled(
              TARGET_DB_URLS.map(async db => {
                const key = await firebasePushToUrl(db.url, queuePath, data);
                return { dbName: db.name, key };
              })
            );
            const pushed = [];
            for (const r of results) {
              if (r.status === 'fulfilled') pushed.push(r.value);
              else console.error(`  ⚠️ Push failed for one DB: ${r.reason?.message}`);
            }
            if (!pushed.length) throw new Error('All Firebase pushes failed!');
            return pushed;
          }

          // ─── UTILITY ──────────────────────────────────────────────────────────────
          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          function generateFilename(title) {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            const hash = Array.from({ length: 4 }, () => chars[Math.floor(Math.random() * chars.length)]).join('');
            if (!title) {
              return Array.from({ length: 12 }, () => chars[Math.floor(Math.random() * chars.length)]).join('') + '.mp3';
            }
            let slug = title.toLowerCase().replace(/[^a-z0-9\s-]/g, '').trim().replace(/\s+/g, '-');
            if (slug.length > 40) slug = slug.substring(0, 40).replace(/-$/, '');
            if (!slug) slug = 'ringtone';
            return `${slug}-${hash}.mp3`;
          }

          // ─── GENERATE ONE UNIQUE RINGTONE FOR A SINGLE DB ─────────────────────────
          // Used by both single-account and all_three modes.
          // Each call produces a fresh audio (new seed) + fresh metadata → unique upload.
          async function generateAndPushOne(prompt, dbTarget) {
            // Step A: Unique metadata per account (Gemini re-called each time)
            let meta;
            try {
              meta = await generateMetadataFromPrompt(prompt);
              console.log(`  📝 [${dbTarget.name}] Title: "${meta.title}"`);
              console.log(`  🏷️  [${dbTarget.name}] Tags: ${meta.tags}`);
            } catch (e) {
              console.warn(`  ⚠️ [${dbTarget.name}] Metadata failed: ${e.message} — using fallback`);
              meta = {
                enhancedPrompt: prompt || 'electronic synth pulse',
                title: (prompt || 'Random Ringtone').split(' ').slice(0, 4).join(' ').slice(0, 30),
                tags: '',
                category: 'OTHER',
                description: ''
              };
            }

            // Step B: Generate unique audio (each call gets a random seed → different sound)
            const { resultUrl } = await generateStableAudio(meta.enhancedPrompt, LENGTH_SECONDS);
            let audioBuffer = await pollStableAudioResult(resultUrl);

            // Step C: Optional auto-processing
            if (AUTO_PROCESS) {
              try {
                audioBuffer = await autoProcessAudio(audioBuffer, VOLUME_BOOST, SILENCE_THRESHOLD, PAD_SEC);
              } catch (e) {
                console.warn(`  ⚠️ [${dbTarget.name}] Auto-process failed: ${e.message}`);
              }
            }

            // Step D: Push to this specific DB only
            const fileBase64 = `data:audio/mpeg;base64,${audioBuffer.toString('base64')}`;
            const fileName = generateFilename(meta.title);
            const key = await firebasePushToUrl(dbTarget.url, QUEUE_PATH, {
              name: fileName,
              type: 'audio/mpeg',
              size: audioBuffer.length,
              width: null,
              height: null,
              isMp3: true,
              fileBase64,
              title: meta.title,
              tags: meta.tags,
              category: meta.category,
              description: meta.description,
              status: 'queued',
              prompt,
              createdAt: Date.now()
            });
            console.log(`  ✅ [${dbTarget.name}] key: ${key}  🎵 "${meta.title}" → ${(audioBuffer.length / 1024).toFixed(0)}KB`);
            return { dbName: dbTarget.name, key, title: meta.title, category: meta.category };
          }

          // ─── PROCESS A SINGLE PROMPT ───────────────────────────────────────────────
          async function processPrompt(idx, prompt) {
            const num = `[${idx + 1}/${AUTO_GENERATE_COUNT}]`;
            console.log(`\n${num} ─────────────────────────────────────────────`);
            if (prompt) console.log(`${num} Prompt: "${prompt}"`);
            else console.log(`${num} Auto-Generating Random Ringtone...`);
            console.log(`${num} ─────────────────────────────────────────────`);

            if (TARGET_DB_URLS.length === 1) {
              // ── Single account: 1 audio → 1 DB ─────────────────────────────────────
              const result = await generateAndPushOne(prompt, TARGET_DB_URLS[0]);
              return { keys: [result], title: result.title, category: result.category };

            } else {
              // ── all_three: generate a UNIQUE audio per account (NOT the same file!) ──
              // Each account gets a different seed → different sound → safe from duplicate detection
              console.log(`  🔀 all_three mode: generating ${TARGET_DB_URLS.length} UNIQUE audios (one per account)...`);
              const pushResults = [];
              for (const dbTarget of TARGET_DB_URLS) {
                console.log(`\n  ➡️  Generating unique ringtone for [${dbTarget.name}]...`);
                try {
                  const result = await generateAndPushOne(prompt, dbTarget);
                  pushResults.push(result);
                } catch (e) {
                  console.error(`  ❌ [${dbTarget.name}] Failed: ${e.message}`);
                }
                // Small delay between accounts to avoid API burst
                if (TARGET_DB_URLS.indexOf(dbTarget) < TARGET_DB_URLS.length - 1) {
                  await sleep(3000);
                }
              }
              if (!pushResults.length) throw new Error('All account pushes failed.');
              return { keys: pushResults, title: pushResults[0].title, category: pushResults[0].category };
            }
          }


          // ─── STARTUP: AUTO-CREATE ACCOUNT IF NO TOKEN PROVIDED ─────────────────────
          if (!currentToken) {
            console.log('\n⚠️  No STABLE_AUDIO_TOKEN provided — auto-creating Stable Audio account...');
            try {
              currentToken = await createStableAudioAccount();
              console.log('✅ Startup account creation successful. Starting generation...');
            } catch (startupErr) {
              console.error(`❌ Startup account creation FAILED: ${startupErr.message}`);
              console.error('   Cannot proceed without a valid token.');
              process.exit(1);
            }
          } else {
            console.log('✅ Using provided STABLE_AUDIO_TOKEN.');
          }

          // Initialize Gemini Shared Browser
          try {
            await initGemini();
          } catch (geminiErr) {
            console.error(`❌ Failed to initialize Gemini browser: ${geminiErr.message}`);
            process.exit(1);
          }

          // ─── MAIN LOOP ─────────────────────────────────────────────────────────────
          let successCount = 0;
          let failedCount = 0;
          const results = [];

          if (AUTO_GENERATE_COUNT === 0) {
            console.log('✅ AUTO_GENERATE_COUNT is 0. Nothing to do.');
            process.exit(0);
          }

          for (let i = 0; i < AUTO_GENERATE_COUNT; i++) {
            try {
              const result = await processPrompt(i, null);
              results.push({ status: 'success', ...result, prompt: 'Auto-Generated' });
              successCount++;
            } catch (err) {
              console.error(`\n❌ Prompt ${i + 1} FAILED: ${err.message}`);
              results.push({ status: 'failed', prompt: 'Auto-Generated', error: err.message });
              failedCount++;

              // If API limit is hit, abort remaining prompts
              if (err.message.startsWith('API_LIMIT_REACHED')) {
                console.error('\n🛑 Aborting: Stable Audio API credits exhausted.');
                console.error('   Update STABLE_AUDIO_TOKEN secret with a fresh token and re-run.');
                for (let j = i + 1; j < AUTO_GENERATE_COUNT; j++) {
                  results.push({ status: 'skipped', prompt: 'Auto-Generated' });
                }
                break;
              }

              // Small delay before retrying next prompt
              if (i < AUTO_GENERATE_COUNT - 1) {
                console.log('  ⏳ Waiting 5s before next prompt...');
                await sleep(5000);
              }
            }
          }

          // ─── SHUTDOWN ─────────────────────────────────────────────────────────────
          if (geminiBrowser) {
            console.log('🌐 Closing Gemini Shared Browser...');
            await geminiBrowser.close().catch(() => {});
          }

          // ─── SUMMARY ──────────────────────────────────────────────────────────────
          const skippedCount = results.filter(r => r.status === 'skipped').length;
          console.log('\n============================================================');
          console.log('  🏁  GENERATION COMPLETE');
          console.log('============================================================');
          console.log(`✅ Success : ${successCount}/${AUTO_GENERATE_COUNT}`);
          console.log(`❌ Failed  : ${failedCount}/${AUTO_GENERATE_COUNT}`);
          console.log(`⏭️  Skipped : ${skippedCount}/${AUTO_GENERATE_COUNT}`);
          console.log('');
          console.log('📋 Results:');
          results.forEach((r, i) => {
            const icon = r.status === 'success' ? '✅' : r.status === 'failed' ? '❌' : '⏭️';
            const detail = r.status === 'success'
              ? `"${r.title}" [${r.category}] → ${r.keys?.map(k => `${k.dbName}:${k.key}`).join(', ')}`
              : r.status === 'failed'
              ? `FAILED: ${r.error?.slice(0, 80)}`
              : 'SKIPPED';
            console.log(`  ${icon} [${i + 1}] "${r.prompt?.slice(0, 40)}" → ${detail}`);
          });
          console.log('============================================================');

          if (failedCount === AUTO_GENERATE_COUNT) {
            process.exit(1);
          }
          SCRIPT_EOF
          node --experimental-vm-modules generator.mjs

      - name: 📊 Upload Run Summary
        if: always()
        run: |
          echo "## ☁️ Bulk Ringtone Generator Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prompts | See workflow input |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ github.event.inputs.length_seconds }}s per ringtone |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-process | ${{ github.event.inputs.auto_process }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Volume Boost | ${{ github.event.inputs.volume_boost_pct }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Account | ${{ github.event.inputs.target_account }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Ringtones pushed to Firebase with status **queued** — Zedge bot will pick them up on next run." >> $GITHUB_STEP_SUMMARY
