name: ☁️ Bulk Ringtone Generator → Firebase

on:
  workflow_dispatch:
    inputs:
      prompts:
        description: |
          🎵 Music Prompts (one per line)
          Example:
            Piano sad emotional melody ambient pad 80 bpm
            Energetic upbeat dance electronic 128 bpm
            Cinematic epic orchestral trailer
        required: true
        type: string

      length_seconds:
        description: "⏱️ Duration per ringtone (seconds, e.g. 30)"
        required: true
        default: "30"

      auto_process:
        description: "🎛️ Auto-process audio (trim silence + volume boost)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

      volume_boost_pct:
        description: "🔊 Volume boost % (100–400)"
        required: false
        default: "200"

      silence_threshold:
        description: "🔇 Silence trim threshold (0.005–0.1)"
        required: false
        default: "0.02"

      pad_ms:
        description: "⏩ Edge padding ms (0–500)"
        required: false
        default: "100"

      target_account:
        description: "🔥 Target Firebase DB (Zedge account)"
        required: true
        default: "zedge_2"
        type: choice
        options:
          - zedge_1
          - zedge_2
          - zedge_3
          - all_three

jobs:
  generate-ringtones:
    name: 🎵 Generate & Push Ringtones to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📥 Install Dependencies
        run: |
          npm init -y
          npm install node-fetch@3 fluent-ffmpeg @ffmpeg-installer/ffmpeg

      - name: 🎵 Generate Ringtones & Push to Firebase
        env:
          STABLE_AUDIO_TOKEN: ${{ secrets.STABLE_AUDIO_TOKEN }}
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          TARGET_ACCOUNT: ${{ github.event.inputs.target_account }}
          PROMPTS_RAW: ${{ github.event.inputs.prompts }}
          LENGTH_SECONDS: ${{ github.event.inputs.length_seconds }}
          AUTO_PROCESS: ${{ github.event.inputs.auto_process }}
          VOLUME_BOOST_PCT: ${{ github.event.inputs.volume_boost_pct }}
          SILENCE_THRESHOLD: ${{ github.event.inputs.silence_threshold }}
          PAD_MS: ${{ github.event.inputs.pad_ms }}
        run: |
          cat > generator.mjs << 'SCRIPT_EOF'
          import fetch from 'node-fetch';
          import fs from 'fs';
          import path from 'path';
          import { execSync } from 'child_process';
          import { createRequire } from 'module';

          // ─── CONFIG ────────────────────────────────────────────────────────────────
          const STABLE_AUDIO_TOKEN   = process.env.STABLE_AUDIO_TOKEN?.trim();
          const GEMINI_KEYS_RAW      = process.env.GEMINI_API_KEYS || '';
          const TARGET_ACCOUNT       = (process.env.TARGET_ACCOUNT || 'zedge_2').trim().toLowerCase();
          const QUEUE_PATH           = 'wallpaperQueue';
          const PROMPTS_RAW          = process.env.PROMPTS_RAW || '';
          const LENGTH_SECONDS       = parseInt(process.env.LENGTH_SECONDS || '30', 10);
          const AUTO_PROCESS         = process.env.AUTO_PROCESS !== 'false';
          const VOLUME_BOOST         = (parseInt(process.env.VOLUME_BOOST_PCT || '200', 10)) / 100;
          const SILENCE_THRESHOLD    = parseFloat(process.env.SILENCE_THRESHOLD || '0.02');
          const PAD_SEC              = (parseInt(process.env.PAD_MS || '100', 10)) / 1000;

          // ─── FIREBASE DB ROUTING ──────────────────────────────────────────────────
          const FIREBASE_DB_MAP = {
            zedge_1: 'https://zedgeautomation-default-rtdb.firebaseio.com',
            zedge_2: 'https://zedge-automation-2-default-rtdb.asia-southeast1.firebasedatabase.app',
            zedge_3: 'https://zedge-automation-3-default-rtdb.asia-southeast1.firebasedatabase.app'
          };

          // Resolve which DB URLs to target
          let TARGET_DB_URLS;
          if (TARGET_ACCOUNT === 'all_three') {
            TARGET_DB_URLS = Object.entries(FIREBASE_DB_MAP).map(([name, url]) => ({ name, url }));
          } else if (FIREBASE_DB_MAP[TARGET_ACCOUNT]) {
            TARGET_DB_URLS = [{ name: TARGET_ACCOUNT, url: FIREBASE_DB_MAP[TARGET_ACCOUNT] }];
          } else {
            console.error(`❌ Unknown target_account: "${TARGET_ACCOUNT}". Use: zedge_1, zedge_2, zedge_3, all_three`);
            process.exit(1);
          }

          // ─── VALIDATION ────────────────────────────────────────────────────────────
          if (!STABLE_AUDIO_TOKEN) {
            console.error('❌ STABLE_AUDIO_TOKEN secret not set. Add it in: Repo → Settings → Secrets → Actions');
            process.exit(1);
          }
          if (!FIREBASE_DB_URL) {
            console.error('❌ Firebase DB URL is empty.');
            process.exit(1);
          }

          const GEMINI_KEYS = GEMINI_KEYS_RAW
            .split(/[\n,]+/)
            .map(k => k.trim())
            .filter(k => k.length > 10);

          if (!GEMINI_KEYS.length) {
            console.error('❌ GEMINI_API_KEYS secret not set. Add one Gemini API key per line in Repo → Settings → Secrets → Actions');
            process.exit(1);
          }

          const PROMPTS = PROMPTS_RAW
            .split('\n')
            .map(p => p.trim())
            .filter(Boolean);

          if (!PROMPTS.length) {
            console.error('❌ No prompts found. Enter at least one prompt in the workflow input.');
            process.exit(1);
          }

          console.log('============================================================');
          console.log('  ☁️  BULK RINGTONE GENERATOR → FIREBASE');
          console.log('============================================================');
          console.log(`📋 Prompts: ${PROMPTS.length}`);
          console.log(`⏱️  Duration: ${LENGTH_SECONDS}s per ringtone`);
          console.log(`🎛️  Auto-process: ${AUTO_PROCESS ? 'Yes' : 'No'}`);
          if (AUTO_PROCESS) {
            console.log(`🔊 Volume Boost: ${Math.round(VOLUME_BOOST * 100)}%`);
            console.log(`🔇 Silence Threshold: ${SILENCE_THRESHOLD}`);
            console.log(`⏩ Pad: ${Math.round(PAD_SEC * 1000)}ms`);
          }
          console.log(`🎯 Target: ${TARGET_ACCOUNT} → ${TARGET_DB_URLS.map(d => d.name).join(' + ')}`);
          TARGET_DB_URLS.forEach(d => console.log(`   🔥 ${d.name}: ${d.url}`));
          console.log(`📂 Queue Path: ${QUEUE_PATH}`);
          console.log(`🤖 Gemini Keys: ${GEMINI_KEYS.length}`);
          console.log('============================================================\n');

          // ─── GEMINI KEY ROTATION ───────────────────────────────────────────────────
          let _geminiKeyIdx = 0;
          function getNextGeminiKey() {
            const key = GEMINI_KEYS[_geminiKeyIdx % GEMINI_KEYS.length];
            _geminiKeyIdx = (_geminiKeyIdx + 1) % GEMINI_KEYS.length;
            return key;
          }

          const GEMINI_MODEL = 'gemini-3.5-flash-lite-preview';

          async function callGemini(promptText, retries = 3) {
            for (let attempt = 1; attempt <= retries; attempt++) {
              const apiKey = getNextGeminiKey();
              try {
                const res = await fetch(
                  `https://generativelanguage.googleapis.com/v1beta/models/${GEMINI_MODEL}:generateContent`,
                  {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
                    body: JSON.stringify({
                      contents: [{ parts: [{ text: promptText }] }],
                      generationConfig: { temperature: 1, topP: 0.95, topK: 40, maxOutputTokens: 1024 }
                    })
                  }
                );
                if (!res.ok) {
                  const err = await res.text();
                  if (attempt < retries) {
                    console.warn(`  ⚠️ Gemini attempt ${attempt} failed (${res.status}). Retrying with next key...`);
                    await sleep(2000);
                    continue;
                  }
                  throw new Error(`Gemini error (${res.status}): ${err.slice(0, 200)}`);
                }
                const data = await res.json();
                return data.candidates[0].content.parts.map(p => p.text).join('').trim();
              } catch (e) {
                if (attempt >= retries) throw e;
                await sleep(2000);
              }
            }
          }

          // ─── VALID RINGTONE CATEGORIES ─────────────────────────────────────────────
          const VALID_RT_CATS = [
            'LATIN', 'MESSAGE_TONES', 'OTHER', 'POP', 'RNB_SOUL', 'REGGAE', 'RELIGIOUS', 'ROCK',
            'SAYINGS', 'ALTERNATIVE', 'ANIMALS', 'BLUES', 'BOLLYWOOD', 'CHILDREN', 'CLASSICAL',
            'SOUND_EFFECTS', 'WORLD', 'COMEDY', 'CONTACT_RINGTONES', 'COUNTRY', 'DANCE',
            'ELECTRONICA', 'GAMES', 'HIP_HOP', 'HOLIDAYS', 'JAZZ'
          ];

          // ─── METADATA GENERATION (4 parallel Gemini calls) ────────────────────────
          async function generateMetadataFromPrompt(prompt) {
            console.log(`  🤖 Generating metadata for: "${prompt.slice(0, 60)}..."`);

            const [title, keywords, category, description] = await Promise.all([
              callGemini(
                `Based on this ringtone/audio generation prompt: "${prompt}"\n\n` +
                `Generate a creative, catchy title that is naturally around 30 characters long. ` +
                `IMPORTANT: DO NOT include BPM or any tempo numbers in the title. Focus on the mood, style, and character of the sound. ` +
                `Only provide the title itself, no extra text or instructions.`
              ),
              callGemini(
                `Based on this ringtone/audio generation prompt: "${prompt}"\n\n` +
                `Extract 15 relevant, descriptive SINGLE-WORD keywords. IMPORTANT: Each keyword MUST be a single word only - ` +
                `NO spaces, NO hyphens, NO multi-word phrases. Focus on: audio style, genre, mood, instruments, emotions, characteristics. ` +
                `Present keywords in a single comma-separated line without punctuation or full stops.`
              ),
              callGemini(
                `Based on this ringtone/audio generation prompt: "${prompt}"\n\n` +
                `Analyze and select the most appropriate category from this exact list. ` +
                `Return only the category name exactly as shown, nothing else: ${VALID_RT_CATS.join(', ')}`
              ),
              callGemini(
                `Based on this ringtone/audio generation prompt: "${prompt}"\n\n` +
                `Write a SHORT description of this ringtone in MAXIMUM 5 WORDS. ` +
                `No punctuation, no sentences, just 5 words or fewer that capture the mood/style. ` +
                `Example outputs: "calm piano lofi beats" or "energetic hip hop groove". ` +
                `Return ONLY the short description, nothing else.`
              )
            ]);

            const cleanedTags = keywords
              .split(',')
              .map(k => k.replace(/[^a-zA-Z0-9]/g, ''))
              .filter(k => k && k.length > 0 && k.length <= 24)
              .slice(0, 10)
              .join(', ');

            const rawCat = (category || '').replace(/[^A-Z_]/g, '').trim().toUpperCase();
            return {
              title: title.replace(/^["']|["']$/g, '').slice(0, 30),
              tags: cleanedTags,
              category: VALID_RT_CATS.includes(rawCat) ? rawCat : 'OTHER',
              description: description.replace(/^["']|["']$/g, '').trim().split(/\s+/).slice(0, 5).join(' ')
            };
          }

          // ─── STABLE AUDIO API ──────────────────────────────────────────────────────
          async function generateStableAudio(prompt, lengthSeconds, retryCount = 0) {
            const seed = Math.floor(Math.random() * 65536) - 32768;
            console.log(`  🎵 Calling Stable Audio API... (seed: ${seed})`);

            const res = await fetch(
              'https://api.stableaudio.com/v1alpha/generations/stable-audio-v2-5/text-to-music',
              {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Authorization': `Bearer ${STABLE_AUDIO_TOKEN}`
                },
                body: JSON.stringify({
                  data: {
                    type: 'generations',
                    attributes: {
                      prompts: [{ text: prompt, weight: 1 }],
                      length_seconds: lengthSeconds,
                      seed
                    }
                  }
                })
              }
            );

            if (!res.ok) {
              const errText = await res.text();
              const errLower = errText.toLowerCase();
              const isLimitError = (
                res.status === 429 ||
                (res.status === 400 && (
                  errLower.includes('limit') || errLower.includes('quota') ||
                  errLower.includes('credit') || errLower.includes('rate') ||
                  errLower.includes('exceeded') || errLower.includes('insufficient')
                ))
              );

              if (isLimitError) {
                console.error('⚠️ Stable Audio API limit reached!');
                console.error('   The current token has exhausted its API credits.');
                console.error('   ➡️  Update the STABLE_AUDIO_TOKEN secret with a fresh token and re-run.');
                throw new Error(`API_LIMIT_REACHED: ${errText.slice(0, 300)}`);
              }

              throw new Error(`Stable Audio API error (${res.status}): ${errText.slice(0, 300)}`);
            }

            const data = await res.json();
            return { resultUrl: data.data[0].links.result, seed };
          }

          async function pollStableAudioResult(resultUrl) {
            const maxRetries = 60;
            for (let i = 0; i < maxRetries; i++) {
              process.stdout.write(`  ⏳ Polling result... attempt ${i + 1}/${maxRetries}\r`);
              const res = await fetch(resultUrl, {
                headers: { 'Authorization': `Bearer ${STABLE_AUDIO_TOKEN}`, 'Accept': '*/*' }
              });
              if (res.status === 200) {
                process.stdout.write('\n');
                console.log(`  ✅ Audio generation complete!`);
                return Buffer.from(await res.arrayBuffer());
              }
              if (res.status === 202) {
                await sleep(3000);
              } else {
                throw new Error(`Poll failed: HTTP ${res.status}`);
              }
            }
            throw new Error('Timed out waiting for audio generation (3 minutes).');
          }

          // ─── AUDIO AUTO-PROCESSING (via ffmpeg) ────────────────────────────────────
          // Trim silence + apply volume boost using ffmpeg (server-side equivalent of browser AudioContext)
          async function autoProcessAudio(inputBuffer, gainFactor, silenceThreshold, padSec) {
            const tmpDir    = '/tmp/ringtone_proc';
            fs.mkdirSync(tmpDir, { recursive: true });
            const tmpIn     = path.join(tmpDir, `in_${Date.now()}.mp3`);
            const tmpOut    = path.join(tmpDir, `out_${Date.now()}.mp3`);

            fs.writeFileSync(tmpIn, inputBuffer);

            // ffmpeg command:
            //   silenceremove: trim leading/trailing silence
            //   volume: amplify by gainFactor
            const dbThreshold = 20 * Math.log10(silenceThreshold); // convert linear to dB
            const dbStr = `${dbThreshold.toFixed(1)}dB`;
            const padMs = Math.round(padSec * 1000);

            try {
              // Step 1: Detect silence boundaries and trim
              const ffmpegPath = process.env.FFMPEG_PATH || 'ffmpeg';
              const filterComplex = [
                // Trim silence from start (stop_periods=0 means only trim start)
                `silenceremove=start_periods=1:start_threshold=${dbStr}:start_silence=${padSec}`,
                // Trim silence from end (by reversing, trimming, reversing back)
                `areverse`,
                `silenceremove=start_periods=1:start_threshold=${dbStr}:start_silence=${padSec}`,
                `areverse`,
                // Apply volume boost
                `volume=${gainFactor}`
              ].join(',');

              execSync(
                `${ffmpegPath} -i "${tmpIn}" -af "${filterComplex}" -ar 44100 -ab 192k -y "${tmpOut}" 2>/dev/null`,
                { timeout: 60000 }
              );

              if (!fs.existsSync(tmpOut) || fs.statSync(tmpOut).size < 1000) {
                throw new Error('ffmpeg output empty or too small');
              }

              const outBuf = fs.readFileSync(tmpOut);
              console.log(`  🎛️  Processed: ${(inputBuffer.length / 1024).toFixed(0)}KB → ${(outBuf.length / 1024).toFixed(0)}KB`);
              return outBuf;
            } finally {
              try { fs.unlinkSync(tmpIn); } catch {}
              try { fs.unlinkSync(tmpOut); } catch {}
            }
          }

          // ─── FIREBASE HELPERS ──────────────────────────────────────────────────────
          // Push to a single DB URL, returns the new Firebase key
          async function firebasePushToUrl(dbUrl, queuePath, data) {
            const res = await fetch(`${dbUrl}/${queuePath}.json`, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify(data)
            });
            if (!res.ok) {
              const err = await res.text();
              throw new Error(`Firebase push failed (${res.status}): ${err.slice(0, 200)}`);
            }
            const result = await res.json();
            return result.name;
          }

          // Push to ALL target DBs in parallel, returns array of { name, key }
          async function firebasePushAll(queuePath, data) {
            const results = await Promise.allSettled(
              TARGET_DB_URLS.map(async db => {
                const key = await firebasePushToUrl(db.url, queuePath, data);
                return { dbName: db.name, key };
              })
            );
            const pushed = [];
            for (const r of results) {
              if (r.status === 'fulfilled') pushed.push(r.value);
              else console.error(`  ⚠️ Push failed for one DB: ${r.reason?.message}`);
            }
            if (!pushed.length) throw new Error('All Firebase pushes failed!');
            return pushed;
          }

          // ─── UTILITY ──────────────────────────────────────────────────────────────
          function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

          function randomName(ext = '.mp3') {
            const chars = 'abcdefghijklmnopqrstuvwxyz0123456789';
            return Array.from({ length: 12 }, () => chars[Math.floor(Math.random() * chars.length)]).join('') + ext;
          }

          // ─── PROCESS A SINGLE PROMPT ───────────────────────────────────────────────
          async function processPrompt(idx, prompt) {
            const num = `[${idx + 1}/${PROMPTS.length}]`;
            console.log(`\n${num} ─────────────────────────────────────────────`);
            console.log(`${num} Prompt: "${prompt}"`);
            console.log(`${num} ─────────────────────────────────────────────`);

            // Step 1: Metadata (Gemini — 4 parallel calls)
            let meta;
            try {
              meta = await generateMetadataFromPrompt(prompt);
              console.log(`  📝 Title: "${meta.title}"`);
              console.log(`  🏷️  Tags: ${meta.tags}`);
              console.log(`  📂 Category: ${meta.category}`);
              console.log(`  📖 Desc: ${meta.description}`);
            } catch (e) {
              console.warn(`  ⚠️ Metadata generation failed: ${e.message} — using fallback`);
              meta = {
                title: prompt.split(' ').slice(0, 4).join(' ').slice(0, 30),
                tags: '',
                category: 'OTHER',
                description: ''
              };
            }

            // Step 2: Generate audio with Stable Audio
            const { resultUrl } = await generateStableAudio(prompt, LENGTH_SECONDS);
            let audioBuffer = await pollStableAudioResult(resultUrl);

            // Step 3: Optional auto-processing (silence trim + volume boost)
            if (AUTO_PROCESS) {
              console.log(`  🎛️  Auto-processing: boost ${Math.round(VOLUME_BOOST * 100)}% | threshold ${SILENCE_THRESHOLD} | pad ${Math.round(PAD_SEC * 1000)}ms`);
              try {
                audioBuffer = await autoProcessAudio(audioBuffer, VOLUME_BOOST, SILENCE_THRESHOLD, PAD_SEC);
              } catch (e) {
                console.warn(`  ⚠️ Auto-processing failed: ${e.message} — using raw audio`);
              }
            }

            // Step 4: Convert to base64
            const fileBase64 = `data:audio/mpeg;base64,${audioBuffer.toString('base64')}`;
            const fileName = randomName('.mp3');

            // Step 5: Push to all target Firebase DBs
            const targetLabel = TARGET_DB_URLS.map(d => d.name).join(' + ');
            console.log(`  🔥 Pushing to Firebase [${targetLabel}]... (${QUEUE_PATH})`);
            const pushResults = await firebasePushAll(QUEUE_PATH, {
              name: fileName,
              type: 'audio/mpeg',
              size: audioBuffer.length,
              width: null,
              height: null,
              isMp3: true,
              fileBase64,
              title: meta.title,
              tags: meta.tags,
              category: meta.category,
              description: meta.description,
              status: 'queued',
              prompt,
              createdAt: Date.now()
            });

            pushResults.forEach(r => console.log(`  ✅ [${r.dbName}] key: ${r.key}`));
            console.log(`  🎵 "${meta.title}" → ${(audioBuffer.length / 1024).toFixed(0)}KB`);
            return { keys: pushResults, title: meta.title, category: meta.category };
          }

          // ─── MAIN LOOP ─────────────────────────────────────────────────────────────
          let successCount = 0;
          let failedCount = 0;
          const results = [];

          for (let i = 0; i < PROMPTS.length; i++) {
            try {
              const result = await processPrompt(i, PROMPTS[i]);
              results.push({ status: 'success', ...result, prompt: PROMPTS[i] });
              successCount++;
            } catch (err) {
              console.error(`\n❌ Prompt ${i + 1} FAILED: ${err.message}`);
              results.push({ status: 'failed', prompt: PROMPTS[i], error: err.message });
              failedCount++;

              // If API limit is hit, abort remaining prompts
              if (err.message.startsWith('API_LIMIT_REACHED')) {
                console.error('\n🛑 Aborting: Stable Audio API credits exhausted.');
                console.error('   Update STABLE_AUDIO_TOKEN secret with a fresh token and re-run.');
                for (let j = i + 1; j < PROMPTS.length; j++) {
                  results.push({ status: 'skipped', prompt: PROMPTS[j] });
                }
                break;
              }

              // Small delay before retrying next prompt
              if (i < PROMPTS.length - 1) {
                console.log('  ⏳ Waiting 5s before next prompt...');
                await sleep(5000);
              }
            }
          }

          // ─── SUMMARY ──────────────────────────────────────────────────────────────
          const skippedCount = results.filter(r => r.status === 'skipped').length;
          console.log('\n============================================================');
          console.log('  🏁  GENERATION COMPLETE');
          console.log('============================================================');
          console.log(`✅ Success : ${successCount}/${PROMPTS.length}`);
          console.log(`❌ Failed  : ${failedCount}/${PROMPTS.length}`);
          console.log(`⏭️  Skipped : ${skippedCount}/${PROMPTS.length}`);
          console.log('');
          console.log('📋 Results:');
          results.forEach((r, i) => {
            const icon = r.status === 'success' ? '✅' : r.status === 'failed' ? '❌' : '⏭️';
            const detail = r.status === 'success'
              ? `"${r.title}" [${r.category}] → ${r.keys?.map(k => `${k.dbName}:${k.key}`).join(', ')}`
              : r.status === 'failed'
              ? `FAILED: ${r.error?.slice(0, 80)}`
              : 'SKIPPED';
            console.log(`  ${icon} [${i + 1}] "${r.prompt?.slice(0, 40)}" → ${detail}`);
          });
          console.log('============================================================');

          if (failedCount === PROMPTS.length) {
            process.exit(1);
          }
          SCRIPT_EOF
          node --experimental-vm-modules generator.mjs

      - name: 📊 Upload Run Summary
        if: always()
        run: |
          echo "## ☁️ Bulk Ringtone Generator Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Prompts | See workflow input |" >> $GITHUB_STEP_SUMMARY
          echo "| Duration | ${{ github.event.inputs.length_seconds }}s per ringtone |" >> $GITHUB_STEP_SUMMARY
          echo "| Auto-process | ${{ github.event.inputs.auto_process }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Volume Boost | ${{ github.event.inputs.volume_boost_pct }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Target Account | ${{ github.event.inputs.target_account }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> Ringtones pushed to Firebase with status **queued** — Zedge bot will pick them up on next run." >> $GITHUB_STEP_SUMMARY
